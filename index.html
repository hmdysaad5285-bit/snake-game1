<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة السلم والثعبان</title>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

h2 { margin:10px; }

#container {
  display:flex;
  justify-content:center;
  gap:20px;
}

canvas {
  background:white;
  border-radius:15px;
  box-shadow:0 0 20px black;
}

#panel {
  display:flex;
  flex-direction:column;
  gap:15px;
}

#dice {
  width:80px;
  height:80px;
  font-size:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:white;
  color:black;
  border-radius:15px;
}

button {
  padding:10px;
  font-size:18px;
  border:none;
  border-radius:10px;
  background:#ff5722;
  color:white;
  cursor:pointer;
}

#winner {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}
</style>
</head>

<body>

<h2>🎲 لعبة السلم والثعبان</h2>

<div id="container">
<canvas id="board" width="500" height="500"></canvas>

<div id="panel">
<div id="dice">🎲</div>
<button onclick="rollDice()">رمي النرد</button>
<div id="status"></div>
</div>
</div>

<div id="winner">
<h1 id="winnerText"></h1>
<button onclick="restart()">إعادة اللعب</button>
</div>

<script>
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

const size=10;
const cell=50;

let players=[1,1];
let current=0;
let moving=false;

const snakes={16:6,47:26,49:11,56:53,62:19,87:24,93:73,98:78};
const ladders={2:38,7:14,8:31,15:26,21:42,28:84,36:44,51:67,71:91};

function drawBoard(){
 ctx.clearRect(0,0,500,500);

 for(let r=0;r<10;r++){
  for(let c=0;c<10;c++){
   ctx.fillStyle=(r+c)%2?"#c8e6c9":"#fff";
   ctx.fillRect(c*cell,r*cell,cell,cell);
   ctx.strokeRect(c*cell,r*cell,cell,cell);
  }
 }

 drawLines();
}

function getPos(n){
 let row=Math.floor((n-1)/10);
 let col=(n-1)%10;
 if(row%2) col=9-col;
 return {x:col*50+25,y:500-(row*50+25)};
}

function drawPlayers(){
 players.forEach((p,i)=>{
  let pos=getPos(p);
  ctx.beginPath();
  ctx.arc(pos.x,pos.y,12,0,Math.PI*2);
  ctx.fillStyle=i?"orange":"blue";
  ctx.fill();
 });
}

function drawLines(){
 ctx.lineWidth=5;

 ctx.strokeStyle="green";
 for(let k in ladders){
  let a=getPos(k),b=getPos(ladders[k]);
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
 }

 ctx.strokeStyle="red";
 for(let k in snakes){
  let a=getPos(k),b=getPos(snakes[k]);
  ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();
 }
}

function animate(p,steps,cb){
 if(steps==0){cb();return;}
 players[p]++;
 drawBoard();drawPlayers();
 setTimeout(()=>animate(p,steps-1,cb),200);
}

function rollDice(){
 if(moving) return;
 moving=true;

 let roll=Math.floor(Math.random()*6)+1;
 document.getElementById("dice").innerText=roll;

 if(players[current]+roll>100){moving=false;return;}

 animate(current,roll,()=>{
  let pos=players[current];

  if(snakes[pos]) players[current]=snakes[pos];
  if(ladders[pos]) players[current]=ladders[pos];

  if(players[current]==100){
    document.getElementById("winner").style.display="flex";
    document.getElementById("winnerText").innerText="🏆 اللاعب "+(current+1)+" فاز!";
    return;
  }

  current=(current+1)%2;
  moving=false;
  drawBoard();drawPlayers();
 });
}

function restart(){
 players=[1,1];
 current=0;
 document.getElementById("winner").style.display="none";
 drawBoard();drawPlayers();
}

drawBoard();
drawPlayers();
</script>

</body>
</html>
