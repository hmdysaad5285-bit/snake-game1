<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Snake & Ladders Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
 margin:0;
 font-family:Arial;
 background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
 color:white;
 text-align:center;
 overflow:hidden;
}

/* شاشة البداية */
#menu{
 position:fixed;
 width:100%;
 height:100%;
 background:#000;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
}

#menu h1{
 font-size:40px;
 margin-bottom:20px;
}

button{
 padding:12px 25px;
 font-size:18px;
 border:none;
 border-radius:12px;
 background:#ff9800;
 color:white;
 cursor:pointer;
 margin:5px;
}

/* اللعبة */
#game{ display:none; }

canvas{
 background:#fff;
 border-radius:15px;
 margin-top:10px;
 box-shadow:0 0 20px black;
}

/* النرد */
#dice{
 width:80px;
 height:80px;
 font-size:40px;
 background:white;
 color:black;
 display:flex;
 justify-content:center;
 align-items:center;
 border-radius:12px;
 margin:10px auto;
 transition:0.2s;
}

/* الفوز */
#winner{
 position:fixed;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.9);
 display:none;
 justify-content:center;
 align-items:center;
 flex-direction:column;
}

/* تأثير فلاش */
.flash{
 animation:flash 0.5s;
}

@keyframes flash{
 0%{background:white;}
 50%{background:yellow;}
 100%{background:white;}
}
</style>
</head>

<body>

<!-- القائمة -->
<div id="menu">
<h1>🎲 Snake & Ladders</h1>
<button onclick="startGame()">▶️ ابدأ اللعب</button>
</div>

<!-- اللعبة -->
<div id="game">
<canvas id="board" width="500" height="500"></canvas>
<div id="dice">🎲</div>
<button onclick="rollDice()">🎲 رمي النرد</button>
<p id="status"></p>
</div>

<!-- الفوز -->
<div id="winner">
<h1 id="winnerText"></h1>
<button onclick="restart()">🔄 إعادة اللعب</button>
</div>

<!-- أصوات -->
<audio id="diceSound" src="https://www.soundjay.com/button/button-16.mp3"></audio>
<audio id="winSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<script>
const canvas=document.getElementById("board");
const ctx=canvas.getContext("2d");

let players=[1,1];
let current=0;
let moving=false;

/* AI لاعب */
let vsAI=true;

const snakes={16:6,47:26,49:11,56:53,62:19,87:24,93:73,98:78};
const ladders={2:38,7:14,8:31,15:26,21:42,28:84,36:44,51:67,71:91};

function startGame(){
 document.getElementById("menu").style.display="none";
 document.getElementById("game").style.display="block";
 draw();
}

function draw(){
 ctx.clearRect(0,0,500,500);

 for(let r=0;r<10;r++){
  for(let c=0;c<10;c++){
   ctx.fillStyle=(r+c)%2?"#c8e6c9":"#fff";
   ctx.fillRect(c*50,r*50,50,50);
   ctx.strokeRect(c*50,r*50,50,50);
  }
 }

 drawPlayers();
}

function getPos(n){
 let row=Math.floor((n-1)/10);
 let col=(n-1)%10;
 if(row%2) col=9-col;
 return {x:col*50+25,y:500-(row*50+25)};
}

function drawPlayers(){
 players.forEach((p,i)=>{
  let pos=getPos(p);
  ctx.beginPath();
  ctx.arc(pos.x,pos.y,12,0,Math.PI*2);
  ctx.fillStyle=i?"orange":"blue";
  ctx.fill();
 });
}

/* حركة */
function animateMove(p,steps,cb){
 if(steps===0){cb();return;}
 players[p]++;
 draw();
 setTimeout(()=>animateMove(p,steps-1,cb),120);
}

/* النرد */
function rollDice(){
 if(moving) return;
 moving=true;

 let dice=document.getElementById("dice");

 dice.classList.add("flash");
 setTimeout(()=>dice.classList.remove("flash"),300);

 let roll=Math.floor(Math.random()*6)+1;
 dice.innerText=roll;

 document.getElementById("diceSound").play();

 if(players[current]+roll>100){moving=false;nextTurn();return;}

 animateMove(current,roll,()=>{
  let pos=players[current];

  if(snakes[pos]){
    players[current]=snakes[pos];
  }
  if(ladders[pos]){
    players[current]=ladders[pos];
  }

  if(players[current]===100){
    win();
    return;
  }

  nextTurn();
 });
}

/* الدور */
function nextTurn(){
 current=(current+1)%2;
 moving=false;
 draw();

 if(vsAI && current===1){
   setTimeout(rollDice,700);
 }
}

/* الفوز */
function win(){
 document.getElementById("winner").style.display="flex";
 document.getElementById("winnerText").innerText="🏆 اللاعب "+(current+1)+" فاز!";
 document.getElementById("winSound").play();
}

/* إعادة */
function restart(){
 players=[1,1];
 current=0;
 document.getElementById("winner").style.display="none";
 draw();
}
</script>

</body>
</html>
