<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>لعبة السلم والثعبان</title>
<link rel="manifest" href="manifest.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg,#1e3c72,#2a5298);
  color: white;
  text-align: center;
}
canvas {
  background: #fff;
  border-radius: 15px;
  margin-top: 10px;
}
button {
  padding: 10px;
  font-size: 18px;
  margin-top: 10px;
}
</style>
</head>
<body>

<h2>🎲 لعبة السلم والثعبان</h2>
<canvas id="board" width="400" height="400"></canvas><br>
<button onclick="rollDice()">رمي النرد</button>
<p id="status"></p>

<script>
const canvas = document.getElementById("board");
const ctx = canvas.getContext("2d");
const size = 10;
const cell = canvas.width / size;

let players = [1,1];
let currentPlayer = 0;

function drawBoard(){
 ctx.clearRect(0,0,canvas.width,canvas.height);
 for(let r=0;r<size;r++){
  for(let c=0;c<size;c++){
   ctx.strokeRect(c*cell,r*cell,cell,cell);
  }
 }
}

function drawPlayers(){
 players.forEach((p,i)=>{
  let row=Math.floor((p-1)/size);
  let col=(p-1)%size;
  ctx.beginPath();
  ctx.arc(col*cell+20,canvas.height-(row*cell+20),10,0,Math.PI*2);
  ctx.fillStyle=i==0?"red":"blue";
  ctx.fill();
 });
}

function rollDice(){
 let roll=Math.floor(Math.random()*6)+1;
 players[currentPlayer]+=roll;
 document.getElementById("status").innerText="اللاعب "+(currentPlayer+1)+" رمى "+roll;
 currentPlayer=(currentPlayer+1)%2;
 drawBoard();
 drawPlayers();
}

drawBoard();
drawPlayers();
</script>

</body>
</html>
